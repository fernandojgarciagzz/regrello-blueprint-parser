function ptRenderTable(){
  var tbody=document.getElementById('ptTbody');if(!tbody)return;
  var sorted=ptSortRows(ptAllRows,ptSortKey,ptSortAsc);
  var h='';
  sorted.forEach(function(r){
    var t=r.t,tid=r.tid,ac=r.ac;
    var sLabel=(r.bp==='child'?'':'S')+r.stage.id+': '+r.stage.name;
    h+='<tr data-tid="'+escHtml(String(tid))+'" data-agent="'+ac+'" data-sid="'+r.stage.id+'">';
    h+='<td class="pt-col-id">'+escHtml(String(tid))+'</td>';
    h+='<td class="pt-col-name">'+escHtml(t.name)+'</td>';
    h+='<td class="pt-col-stage">'+escHtml(sLabel)+'</td>';
    h+='<td class="pt-col-agent"><span class="abadge '+(clsMap[ac]||'')+'">'+escHtml(t.agent)+'</span></td>';
    h+='<td class="pt-col-wc">'+r.wc+'</td>';
    h+='<td class="pt-col-fm">'+(r.fm.length||'\u2014')+'</td>';
    h+='<td class="pt-col-prompt">';
    if(docReaderConfig[tid]) h+=renderDocReaderTable(tid);
    else if(taskPrompts[tid]) h+='<div class="prompt-text">'+taskPrompts[tid]+'</div>';
    else if(ac==='human') h+='<div class="prompt-empty">Human task \u2014 manual action required</div>';
    else if(taskMap[tid]&&taskMap[tid]._isChildLink) h+='<div class="prompt-empty">Linked Workflow \u2014 invokes child blueprint</div>';
    else h+='<div class="prompt-empty">No description available</div>';
    h+='</td>';
    h+='<td class="pt-col-actions">';
    if(r.hasContent) h+='<button class="pt-copy-btn" id="ptc-'+escHtml(String(tid))+'" onclick="ptCopy(\''+escHtml(String(tid))+'\')" title="Copy prompt">'+copyIcon+'</button>';
    h+='</td></tr>';
  });
  tbody.innerHTML=h;
  ptFilter();
}

function renderDocReaderTable(taskId){
  var cfg=docReaderConfig[taskId];if(!cfg)return '';
  var h='';
  if(cfg.form) h+='<div class="dr-form-label">Form: '+escHtml(cfg.form)+'</div>';
  h+='<table class="dr-table"><thead><tr>';
  h+='<th>Field</th><th>Type</th><th>Description</th><th style="text-align:center">Multiple</th><th>Choices</th>';
  h+='</tr></thead><tbody>';
  (cfg.fields||[]).forEach(function(f){
    var mv=f.multi?'Yes':'\u2014';
    var ch=(f.choices&&f.choices.length)?escHtml(f.choices.join(', ')):'\u2014';
    h+='<tr><td>'+escHtml(f.n)+'</td><td>'+escHtml(f.t)+'</td><td style="color:var(--text-dim)">'+escHtml(f.helper||'')+'</td><td style="text-align:center">'+mv+'</td><td>'+ch+'</td></tr>';
  });
  h+='</tbody></table>';
  return h;
}

function ptCopy(tid){
  var text='';
  if(docReaderConfig[tid]){
    var cfg=docReaderConfig[tid],lines=[];
    if(cfg.form)lines.push('Form: '+cfg.form);
    (cfg.fields||[]).forEach(function(f){
      var p=[f.n,f.t];if(f.helper)p.push(f.helper);if(f.multi)p.push('Multiple: Yes');
      if(f.choices&&f.choices.length)p.push('Choices: '+f.choices.join(', '));
      lines.push(p.join(' | '));
    });
    text=lines.join('\n');
  }else if(taskPrompts[tid]){text=ptStripHtml(taskPrompts[tid])}
  if(!text)return;
  var btn=document.getElementById('ptc-'+tid);
  navigator.clipboard.writeText(text).then(function(){
    if(btn){btn.classList.add('copied');btn.textContent='\u2713';
    setTimeout(function(){btn.classList.remove('copied');btn.innerHTML=copyIcon},2000)}
  });
}

function ptCopyAll(){
  var vis=ptGetVisible();
  var lines=[];
  vis.forEach(function(tid){
    var t=taskMap[tid];if(!t)return;
    var text='';
    if(docReaderConfig[tid]){
      var cfg=docReaderConfig[tid],dl=[];
      if(cfg.form)dl.push('Form: '+cfg.form);
      (cfg.fields||[]).forEach(function(f){dl.push(f.n+': '+(f.helper||''))});
      text=dl.join('\n');
    }else if(taskPrompts[tid]){text=ptStripHtml(taskPrompts[tid])}
    if(text)lines.push('--- Task '+tid+': '+t.name+' ---\n'+text);
  });
  if(!lines.length)return;
  navigator.clipboard.writeText(lines.join('\n\n'));
}

function ptExportCSV(){
  var vis=ptGetVisible();
  var csvRows=[['Task ID','Task Name','Stage','Agent','Agent Type','Word Count','Field Mentions','Prompt'].map(function(h){return '"'+h+'"'}).join(',')];
  vis.forEach(function(tid){
    var r=ptAllRows.find(function(x){return x.tid===tid});if(!r)return;
    var text=r.plainText||'';
    var fmStr=r.fm.join('; ');
    var sLabel=(r.bp==='child'?'':'S')+r.stage.id+': '+r.stage.name;
    var row=[
      '"'+String(tid)+'"',
      '"'+r.t.name.replace(/"/g,'""')+'"',
      '"'+sLabel.replace(/"/g,'""')+'"',
      '"'+r.t.agent.replace(/"/g,'""')+'"',
      '"'+r.ac+'"',
      r.wc,
      '"'+fmStr.replace(/"/g,'""')+'"',
      '"'+text.replace(/"/g,'""')+'"'
    ];
    csvRows.push(row.join(','));
  });
  var blob=new Blob([csvRows.join('\n')],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='agent_prompts.csv';a.click();
  URL.revokeObjectURL(url);
}

function ptFilter(){
  var q=((document.getElementById('ptSearch')||{}).value||'').toLowerCase().trim();
  var hasSt=ptSelStages.size>0,hasAg=ptSelAgents.size>0;
  var trs=document.querySelectorAll('#ptTbody tr');
  var visCount=0,totalVis=0;
  trs.forEach(function(row){
    var tid=row.getAttribute('data-tid')||'';
    var ac=row.getAttribute('data-agent')||'';
    var sid=row.getAttribute('data-sid')||'';
    var t=taskMap[tid];
    var nm=t?(t.name||'').toLowerCase():'';
    var ag=t?(t.agent||'').toLowerCase():'';
    var pt=taskPrompts[tid]?taskPrompts[tid].toLowerCase():'';
    var matchQ=!q||tid.toLowerCase().indexOf(q)!==-1||nm.indexOf(q)!==-1||ag.indexOf(q)!==-1||pt.indexOf(q)!==-1;
    var matchSt=!hasSt||ptSelStages.has(String(sid));
    var matchAg=!hasAg||ptSelAgents.has(ac);
    var vis=matchQ&&matchSt&&matchAg;
    row.style.display=vis?'':'none';
    if(vis){totalVis++;var r=ptAllRows.find(function(x){return x.tid===tid});if(r&&r.hasContent)visCount++}
  });
  var stats=document.getElementById('ptStats');
  var filtered=q||hasSt||hasAg;
  if(stats)stats.textContent=visCount+' prompts'+(filtered?' (filtered)':'');
}


// ==============================================================
// VISUAL GRAPH (Task-level Dagre-D3)
// ==============================================================
var vgZoom,vgGraph;
function renderVisualGraph(){
  var el=document.getElementById('tp-vgraph');
  el.innerHTML='<div style="display:flex;gap:8px;margin-bottom:10px"><button class="fbtn" onclick="fitVG()">Fit to Screen</button><button class="fbtn" onclick="resetVG()">Reset Zoom</button><span style="font-size:12px;color:var(--text-dim);margin-left:auto">Click a task node to see its connections</span></div><svg id="vgraph-svg" style="height:calc(100vh - 280px)"><g id="vg-g"></g></svg>';

  var g=new dagreD3.graphlib.Graph({compound:true}).setGraph({rankdir:'TB',ranksep:35,nodesep:20,marginx:20,marginy:20}).setDefaultEdgeLabel(function(){return{}});
  var render=new dagreD3.render();

  // Stage clusters
  stages.forEach(function(s){
    if(!s.tasks.length)return;
    g.setNode('cl_'+s.id,{label:'S'+s.id+': '+s.name,clusterLabelPos:'top',
      style:'fill:color-mix(in srgb,var(--surface2) 50%,transparent);stroke:var(--border);rx:8',
      labelStyle:'fill:var(--text-dim);font-size:10px'});
  });

  // Task nodes
  stages.forEach(function(s){s.tasks.forEach(function(t){
    var col=cm(t.agentClass);
    var shortName=t.name.length>28?t.name.substring(0,26)+'…':t.name;
    g.setNode('t_'+t.id,{
      labelType:'html',
      label:'<div style="text-align:center;line-height:1.3"><div style="font-weight:700;font-size:10px">'+t.id+'</div><div style="font-size:9px;color:var(--text-dim);white-space:nowrap">'+shortName+'</div></div>',
      style:'fill:'+col+'22;stroke:'+col,
      shape:'rect',rx:4,ry:4,width:180,height:38,
      _tid:t.id
    });
    g.setParent('t_'+t.id,'cl_'+s.id);
  })});

  // Aggregated edges
  var done={};
  parentEdges.forEach(function(e){
    var k=e.from+'->'+e.to;
    if(done[k])return;done[k]=true;
    var ae=aggTaskEdges[k];
    g.setEdge('t_'+e.from,'t_'+e.to,{
      style:'stroke:var(--border);stroke-width:1;opacity:.5',arrowheadStyle:'fill:var(--border)',curve:d3.curveBasis,
      _fields:ae?ae.fields:[]
    });
  });

  var svg=d3.select('#vgraph-svg');
  var inner=svg.select('#vg-g');
  inner.selectAll('*').remove();
  render(inner,g);
  vgGraph=g;

  vgZoom=d3.zoom().scaleExtent([.1,3]).on('zoom',function(){inner.attr('transform',d3.event.transform)});
  svg.call(vgZoom);

  // Click handler
  inner.selectAll('.node').on('click',function(id){
    var nd=g.node(id);if(!nd||!nd._tid)return;
    highlightVGNode(nd._tid,inner,g);
    var t=taskMap[nd._tid];if(t)openTaskSP(t);
  });

  // Tooltip on edges
  var tip=d3.select('#tooltip');
  inner.selectAll('.edgePath').on('mouseover',function(e){
    var ed=g.edge(e);if(!ed||!ed._fields||!ed._fields.length)return;
    tip.html(ed._fields.join('<br>')).style('left',(d3.event.pageX+12)+'px').style('top',(d3.event.pageY-10)+'px').style('opacity',1);
  }).on('mousemove',function(){tip.style('left',(d3.event.pageX+12)+'px').style('top',(d3.event.pageY-10)+'px')}).on('mouseout',function(){tip.style('opacity',0)});

  setTimeout(fitVG,100);
}

function highlightVGNode(tid,inner,g){
  var a=adj[tid];
  var up=a?a.up:new Set;
  var dn=a?a.dn:new Set;
  inner.selectAll('.node').each(function(id){
    var nd=g.node(id);if(!nd||!nd._tid)return;
    var nid=nd._tid;
    if(nid===tid)d3.select(this).style('opacity',1).select('rect').style('stroke-width','3');
    else if(up.has(nid))d3.select(this).style('opacity',1).select('rect').style('stroke',cssVar('--cyan')).style('stroke-width','2');
    else if(dn.has(nid))d3.select(this).style('opacity',1).select('rect').style('stroke',cssVar('--green')).style('stroke-width','2');
    else d3.select(this).style('opacity',.2);
  });
  inner.selectAll('.edgePath').each(function(e){
    var src=(e.v||'').replace('t_',''),tgt=(e.w||'').replace('t_','');
    var related=(src===tid||tgt===tid);
    d3.select(this).style('opacity',related?1:.1);
  });
}

function fitVG(){
  if(!vgGraph)return;
  var svg=d3.select('#vgraph-svg');
  var gw=vgGraph.graph().width||800,gh=vgGraph.graph().height||600;
  var sw=svg.node().getBoundingClientRect().width||800;
  var sh=svg.node().getBoundingClientRect().height||600;
  var sc=Math.min(sw/(gw+60),sh/(gh+60))*.9;
  svg.transition().duration(400).call(vgZoom.transform,d3.zoomIdentity.translate((sw-gw*sc)/2,15).scale(sc));
}
function resetVG(){d3.select('#vgraph-svg').transition().duration(300).call(vgZoom.transform,d3.zoomIdentity)}

// ==============================================================
// INIT
// ==============================================================
switchView('detailed');
colorMap=getColorMap();
updateSvgMarkers();
</script>
</body>
